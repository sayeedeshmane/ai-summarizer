<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cloud Summarizer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        button:disabled { background: #ccc; }
        #output { margin-top: 20px; padding: 15px; background: #eef2ff; border-radius: 8px; display: none; line-height: 1.6; border-left: 5px solid #0070f3; }
    </style>
</head>
<body>

<div class="card">
    <h1>Cloud AI Summarizer</h1>
    <p>Architecture: Vercel + Hugging Face REST API</p>
    <textarea id="textInput" placeholder="Paste a long paragraph here..."></textarea>
    <button id="btn" onclick="runAI()">Summarize on Cloud</button>
    <div id="output"></div>
</div>

<script>
    // 1. YOUR API SETTINGS
    const API_URL = "https://api-inference.huggingface.co/models/facebook/bart-large-cnn";
    const HF_TOKEN = "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"; 

    async function runAI() {
        const text = document.getElementById('textInput').value;
        const outDiv = document.getElementById('output');
        const btn = document.getElementById('btn');

        if (!text || text.length < 15) {
            alert("Please paste at least one full sentence.");
            return;
        }

        // UI Feedback
        outDiv.style.display = "block";
        outDiv.innerHTML = "⏳ Cloud is thinking... (Please wait 30-60 seconds for the first run)";
        btn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: text,
                    options: { wait_for_model: true }
                })
            });

            const result = await response.json();

            // Check if the cloud returned an error (like model loading)
            if (!response.ok) {
                throw new Error(result.error || "Cloud API Error");
            }

            // Successfully received summary
            if (result && result[0] && result[0].summary_text) {
                outDiv.innerHTML = "<strong>Summary:</strong><br>" + result[0].summary_text;
            } else {
                outDiv.innerHTML = "Cloud returned an empty response. Try slightly longer text.";
            }

        } catch (err) {
            console.error("Error:", err);
            outDiv.innerHTML = "❌ Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
