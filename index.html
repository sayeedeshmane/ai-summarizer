<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud AI Summarizer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #output { margin-top: 20px; padding: 15px; background: #eef2ff; border-radius: 8px; display: none; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h1>Cloud AI Summarizer</h1>
    <p>Architecture: Vercel + Hugging Face JS SDK</p>
    <textarea id="textInput" placeholder="Paste text here..."></textarea>
    <button id="btn" onclick="runAI()">Summarize on Cloud</button>
    <div id="output"></div>
</div>

<script type="module">
    import { InferenceClient } from "https://cdn.jsdelivr.net/npm/@huggingface/inference@2.6.4/+esm";

    const hf = new InferenceClient("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");

    window.runAI = async function() {
        const text = document.getElementById('textInput').value;
        const outDiv = document.getElementById('output');
        const btn = document.getElementById('btn');

        if (!text) return alert("Please enter text");

        outDiv.style.display = "block";
        outDiv.innerHTML = "⏳ Cloud is thinking (can take 30s)...";
        btn.disabled = true;

        try {
            const result = await hf.summarization({
                model: 'facebook/bart-large-cnn',
                inputs: text,
                parameters: { max_length: 100 },
                options: { wait_for_model: true }
            });

            outDiv.innerHTML = "<strong>Summary:</strong><br>" + result.summary_text;
        } catch (err) {
            outDiv.innerHTML = "❌ Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
