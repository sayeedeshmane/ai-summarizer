<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cloud Summarizer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        button:disabled { background: #ccc; }
        #output { margin-top: 20px; padding: 15px; background: #eef2ff; border-radius: 8px; display: none; line-height: 1.6; border-left: 5px solid #0070f3; }
    </style>
</head>
<body>

<div class="card">
    <h1>Cloud AI Summarizer</h1>
    <p>Architecture: Vercel + Hugging Face REST API</p>
    <textarea id="textInput" placeholder="Paste a long paragraph here..."></textarea>
    <button id="btn" onclick="runAI()">Summarize on Cloud</button>
    <div id="output"></div>
</div>

<script>
   async function runAI() {
    const text = document.getElementById('textInput').value;
    const outDiv = document.getElementById('output');
    outDiv.style.display = "block";
    outDiv.innerHTML = "⏳ Connecting to Cloud...";

    try {
        const response = await fetch("/api/summarize", {
            method: "POST",
            body: JSON.stringify({ text: text })
        });

        // SAFETY: Check if we got HTML instead of JSON
        const contentType = response.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            const rawText = await response.text();
            console.error("Received HTML instead of JSON:", rawText);
            throw new Error("Server sent back a webpage instead of data. Check Vercel logs.");
        }

        const result = await response.json();
        if (result.isError) {
            outDiv.innerHTML = "⚠️ " + result.message;
        } else {
            outDiv.innerHTML = "<strong>Summary:</strong><br>" + result.summary;
        }
    } catch (err) {
        outDiv.innerHTML = "❌ Error: " + err.message;
    }
}
</script>

</body>
</html>
