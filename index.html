<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Cloud Summarizer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: auto; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin: 10px 0; }
        button { background: #0070f3; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; color: #333; line-height: 1.6; background: #eef; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud AI Summarizer</h1>
        <p>Paste a long article below and let the Cloud process it.</p>
        <textarea id="textInput" placeholder="Paste your long text here..."></textarea>
        <button onclick="summarizeText()">Summarize on Cloud</button>
        <div id="output"></div>
    </div>

    <script>
        async function summarizeText() {
            const text = document.getElementById('textInput').value;
            const outputDiv = document.getElementById('output');
            
            outputDiv.style.display = "block";
            outputDiv.innerHTML = "Cloud is thinking...";

            // The Cloud API Call
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                headers: { Authorization: "Bearer YOUR_HUGGING_FACE_TOKEN_HERE" },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });

            const result = await response.json();
            outputDiv.innerHTML = "<strong>Summary:</strong><br>" + result[0].summary_text;
        }
    </script>
</body>
</html>
