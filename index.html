<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cloud Summarizer</title>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.3s; }
        button:hover { background: #005bc1; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #output-box { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: #f8f9fa; border-left: 4px solid var(--primary); display: none; }
        .loading-spinner { color: var(--primary); font-weight: bold; }
        .error { border-left-color: #ff4d4d !important; color: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cloud AI Summarizer</h1>
    <p>Using Hugging Face Inference API & Vercel Edge Hosting</p>
    
    <textarea id="textInput" placeholder="Paste a long article or paragraph here (at least 50 words for best results)..."></textarea>
    
    <button id="submitBtn" onclick="summarizeText()">Summarize on Cloud</button>

    <div id="output-box">
        <div id="status" class="loading-spinner"></div>
        <div id="resultText" style="margin-top: 10px; line-height: 1.6; color: #333;"></div>
    </div>
</div>

<script>
    async function summarizeText() {
        const text = document.getElementById('textInput').value;
        const btn = document.getElementById('submitBtn');
        const outputBox = document.getElementById('output-box');
        const status = document.getElementById('status');
        const resultText = document.getElementById('resultText');

        if (!text || text.length < 20) {
            alert("Please paste more text to summarize.");
            return;
        }

        // UI Updates
        btn.disabled = true;
        outputBox.style.display = "block";
        outputBox.classList.remove('error');
        status.innerHTML = "✨ Cloud is processing...";
        resultText.innerHTML = "";

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                headers: { 
                    "Authorization": "Bearer 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",
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ 
                    inputs: text,
                    options: { wait_for_model: true } 
                }),
            });

            const result = await response.json();

            if (response.ok && Array.isArray(result) && result[0].summary_text) {
                status.innerHTML = "✅ Summary Complete:";
                resultText.innerHTML = result[0].summary_text;
            } else if (result.error) {
                // If model is loading, Hugging Face returns an error with estimated time
                throw new Error(result.error);
            } else {
                throw new Error("Failed to get summary. Please try again.");
            }

        } catch (err) {
            outputBox.classList.add('error');
            status.innerHTML = "❌ Cloud Error";
            resultText.innerHTML = err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
